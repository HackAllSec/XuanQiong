name: SLSA Go releaser
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: read-all

jobs:
  build:
    permissions:
      id-token: write # To sign.
      contents: write # To upload release assets.
      actions: read   # To read workflow path.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [windows, linux, darwin]
        goarch: [amd64, 386, arm64, arm]
        exclude:
          - goos: darwin
            goarch: 386
          - goos: darwin
            goarch: arm
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse CHANGELOG
        id: parse_changelog
        run: |
          version=$(grep -E '## \[([0-9]+\.[0-9]+\.[0-9]+)\] - [0-9]{4}-[0-9]{2}-[0-9]{2}.*' CHANGELOG.md | head -n 1 | sed -E 's/## \[([0-9]+\.[0-9]+\.[0-9]+)\] - [0-9]{4}-[0-9]{2}-[0-9]{2}(.*)/\1 \2/')
          description=$(awk '/## \[/ {if (found) {found=0; exit} else {found=1; next}} found' CHANGELOG.md)
          echo "Latest Version: $version"
          echo "Release Notes: $description"
          latest_tag=$(git describe --tags `git rev-list --tags --max-count=1`)
          echo "Latest Tag: ${latest_tag#v}"
          if [[ "$(echo "${latest_tag#v}" | xargs)" == "$(echo "$version" | xargs)" ]]; then
              echo "Not a release event, ending workflow."
              exit 0
          fi
          echo "RELEASE_TAG=$version" >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$description" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set up Go
        if: steps.parse_changelog.outputs.RELEASE_TAG != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
          
      - name: Build
        if: steps.parse_changelog.outputs.RELEASE_TAG != ''
        run: |
          echo "Building for ${{ matrix.goos }}/${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -ldflags="-s -w" -o xuanqiong-${{ matrix.goos }}-${{ matrix.goarch }}.exe main.go
            zip -r xuanqiong-${{ matrix.goos }}-${{ matrix.goarch }}.zip xuanqiong-${{ matrix.goos }}-${{ matrix.goarch }}.exe config.yaml frontend/dist/ admin/dist/
          else
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -ldflags="-s -w" -o xuanqiong-${{ matrix.goos }}-${{ matrix.goarch }} main.go
            zip -r xuanqiong-${{ matrix.goos }}-${{ matrix.goarch }}.zip xuanqiong-${{ matrix.goos }}-${{ matrix.goarch }} config.yaml frontend/dist/ admin/dist/
          fi

      - name: Upload release assets
        if: steps.parse_changelog.outputs.RELEASE_TAG != ''
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: xuanqiong-*.zip
          tag: ${{ steps.parse_changelog.outputs.RELEASE_TAG }}
          body: ${{ steps.parse_changelog.outputs.RELEASE_NOTES }}
          overwrite: true
          file_glob: true
